# Hello World Job
# Root job with no dependencies

job:
  # Unique identifier
  id: hello.world
  version: "1.0.0"

  # Registry declarations
  reads:
    - hello_input
  writes:
    - hello_output

  # No dependencies (root job)
  depends: []

  # Schedule: run 32-48 times per day (every 30-45 minutes for load testing)
  schedule:
    min_daily: 32
    max_daily: 48

  # Runtime configuration
  run:
    user: nobody  # For PoC, use current user
    timeout: 300  # 5 minutes
